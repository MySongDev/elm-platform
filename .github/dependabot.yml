version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      frontend-tooling:
        patterns:
          - vite
          - vitest
          - vue-tsc
          - '@vitejs/*'
          - 'unplugin-*'
      linting:
        patterns:
          - eslint
          - '@antfu/*'
          - 'stylelint*'
      backend-tooling:
        patterns:
          - '@nestjs/*'
          - prisma
          - '@prisma/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
