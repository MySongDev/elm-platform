name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Stylelint
        run: pnpm lint:style

  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @elm-platform/contracts run build && pnpm --filter @elm-platform/vite-config run build

      - name: Generate Prisma client
        run: pnpm --filter vue3-elm-node run prisma:generate

      - name: Type check admin
        run: pnpm --filter elm-web-admin run type-check

      - name: Type check user
        run: pnpm --filter vue3-elm-js run type-check

      - name: Test server
        run: pnpm --filter vue3-elm-node run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elm_test?schema=public

      - name: Test admin
        run: pnpm --filter elm-web-admin run test:unit

      - name: Test user
        run: pnpm --filter vue3-elm-js run test

      - name: Build server
        run: pnpm --filter vue3-elm-node run build

      - name: Build admin
        run: pnpm --filter elm-web-admin run build

      - name: Build user
        run: pnpm --filter vue3-elm-js run build

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @elm-platform/contracts run build && pnpm --filter @elm-platform/vite-config run build

      - name: Generate Prisma client
        run: pnpm --filter vue3-elm-node run prisma:generate

      - name: Generate coverage reports
        run: pnpm test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elm_test?schema=public

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run non-blocking dependency audit
        run: pnpm audit --registry=https://registry.npmjs.org || true

  api-drift:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @elm-platform/contracts run build && pnpm --filter @elm-platform/vite-config run build

      - name: Generate Prisma client
        run: pnpm --filter vue3-elm-node run prisma:generate

      - name: Run database migrations
        run: pnpm --filter vue3-elm-node run prisma:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elm_test?schema=public

      - name: Start server
        run: pnpm --filter vue3-elm-node run start &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elm_test?schema=public
          APP_PORT: 3000
          APP_PREFIX: api

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/api-docs-json > /dev/null && break
            sleep 1
          done

      - name: Generate API types
        run: pnpm api:generate

      - name: Check for API drift
        run: |
          if ! git diff --quiet packages/api-types/; then
            echo "❌ API types are out of date. Run 'pnpm api:generate' and commit the changes."
            git diff packages/api-types/
            exit 1
          fi
          echo "✅ API types are up to date."
