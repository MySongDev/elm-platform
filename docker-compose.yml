services:
  postgres:
    image: postgres:16-alpine
    container_name: elm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elm_dev
    ports:
      - '5432:5432'
    volumes:
      - elm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres -d elm_dev]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - elm_redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  elm_postgres_data:
  elm_redis_data:
